name: Deploy MoodleQuiz Live

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v1
        with:
          channel: "stable"

      - name: Verify Flutter Version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: |
          flutter build web --wasm --release --base-href=/qip/
          cp build/web/index.html build/web/404.html

      - name: Deploy
        run: |
          git config --global init.defaultBranch main
          cd build/web
          git init
          git config --global user.email josuemorais@gmail.com
          git config --global user.name josuemoraisgh
          git status
          git remote add origin https://${{secrets.token}}@github.com/iapsicopatologia/qip.git
          git checkout -b gh-pages
          git add --all
          git commit -m "update"
          git push origin gh-pages -f
