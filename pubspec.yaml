name: moodle_quiz_live
description: Plataforma interativa de quiz com integração Moodle e Google Sheets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8
  web: ^1.1.1
  flutter_widget_from_html: ^0.15.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.json
    - assets/qrcode.png
